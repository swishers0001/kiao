<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Click Here Button</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
    }

    a.btn {
      display: inline-block;
      padding: 40px 120px;
      background: #007bff;
      color: #fff;
      font-size: 1.1rem;
      font-family: Arial, sans-serif;
      font-weight: bold;
      text-decoration: none;
      border-radius: 6px;
      cursor: pointer;
    }

    a.btn:hover {
      background: #0056c7;
    }
  </style>
</head>
<body>

  <!-- Change href to your desired link -->
  <a class="btn" href="https://staging.d2pkymqzwpph66.amplifyapp.com" target="_blank">Click Here</a>

</body>
</html>
